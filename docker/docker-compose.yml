# Central Docker config — build context is the repo root (../.. from this file).
# Run from repo root:
#   cp frontend/docker/root.dockerignore .dockerignore
#   docker compose -f frontend/docker/docker-compose.yml up --build
#
# After moving to repo root (mv frontend/docker docker), change dockerfile paths
# from frontend/docker/... to docker/... and context from ../.. to ..

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: mbdapps
      CORS_ORIGINS: http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:80
    depends_on:
      - mongo

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
